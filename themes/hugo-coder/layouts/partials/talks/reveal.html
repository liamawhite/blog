<div class="reveal" style="height: 700px;">

    {{ $revealBase := resources.Get "reveal/scss/reveal.scss" | resources.ToCSS | resources.Minify | resources.Fingerprint }}
    {{ $revealDark := resources.Get "reveal/scss/theme/source/dark.scss" | resources.ToCSS | resources.Minify | resources.Fingerprint }}
    <link rel="stylesheet" href="{{ $revealBase.Permalink }}">
    <link rel="stylesheet" href="{{ $revealDark.Permalink }}" id="theme">
    <link rel="stylesheet" href="/reveal/plugin/highlight/monokai.css">
    <div class="slides">

        <!-- Slides are separated by newline + three dashes + newline, vertical slides identical but two dashes -->
        <section data-markdown data-separator="^\n---\n" data-separator-vertical="^\n--\n$" data-separator-note="^Note:">
            <script type="text/template">
                ## {{ .Title }}
                {{ .Params.Subtitle }}

                ---

                {{ .RawContent }}
            </script>
        </section>

    </div>
</div>

<script src="/reveal/dist/reveal.js"></script>
<script src="/reveal/plugin/markdown/markdown.js"></script>
<script src="/reveal/plugin/highlight/highlight.js"></script>
<script src="/reveal/plugin/notes/notes.js"></script>

<script>
    Reveal.initialize({
        // Display
        center: true,
        width: 960,
        height: 700,
        embedded: true,

        // Slide management
        hashOneBasedIndex: true,
        hash:true,
        history: true,
        respondToHashChanges: true,

        plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
    });
</script>
